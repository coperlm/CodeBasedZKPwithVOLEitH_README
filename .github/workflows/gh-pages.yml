name: Deploy mdBook to GitHub Pages
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: '0.5.4'
      - name: Install mdbook-mermaid (Fast)
        env:
          MERMAID_VERSION: v0.17.0
        run: |
          curl -L https://github.com/badboy/mdbook-mermaid/releases/download/${MERMAID_VERSION}/mdbook-mermaid-${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv mdbook-mermaid /usr/local/bin/
      - name: Build
        run: mdbook build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book